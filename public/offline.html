<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sem conexão — Escritório Digital</title>
  <style>
    html,body{height:100%;margin:0}
    body{background:#0D140F;color:#e7ece9;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
    .box{max-width:340px}
    .mark{font-weight:800;font-size:28px;color:#C2F73A;letter-spacing:-1px}
    h1{font-size:18px;margin:16px 0 6px}
    p{font-size:14px;color:#9aa3a0;margin:0}
    button{margin-top:20px;background:#C2F73A;color:#0D140F;border:0;border-radius:12px;
      padding:12px 18px;font-weight:600;font-size:14px;cursor:pointer}
  </style>
</head>
<body>
  <div class="box">
    <div class="mark">ED</div>
    <h1>Você está sem conexão</h1>
    <p>O Escritório Digital precisa de internet para mostrar dados atualizados. Reconecte e tente de novo.</p>
    <button onclick="location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
